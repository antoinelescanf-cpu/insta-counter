name: Update Instagram Followers

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get followers
        run: |
          curl -s "https://i.instagram.com/api/v1/users/web_profile_info/?username=veterinaires.lannion.sevetys" \
          -H "User-Agent: Mozilla/5.0" \
          > data.json

      - name: Extract followers
        run: |
          followers=$(cat data.json | grep -o '"edge_followed_by":{"count":[0-9]*' | grep -o '[0-9]*')
          echo "{ \"followers\": $followers }" > followers.json

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add followers.json
          git commit -m "update followers" || echo "no change"
          git push
